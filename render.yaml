services:
  - type: web
    name: dekont-kontrol
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PANEL_USERNAME
        sync: false
      - key: PANEL_PASSWORD
        sync: false
      - key: PANEL_NAME
        sync: false
      - key: DEKONT_MAIL
        sync: false
      - key: DEKONT_APP_PASSWORD
        sync: false
      - key: MUSTI_MAIL
        sync: false
      - key: MUSTI_APP_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STATE_KEY
        value: dekont-kontrol-site
      - key: SCAN_INTERVAL_MS
        value: 1000
      - key: DATABASE_FILE
        value: data/database.json
