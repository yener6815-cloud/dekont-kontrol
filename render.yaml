services:
  - type: web
    name: dekont-kontrol
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    disk:
      name: dekont-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PANEL_USERNAME
        sync: false
      - key: PANEL_PASSWORD
        sync: false
      - key: PANEL_NAME
        sync: false
      - key: DEKONT_MAIL
        sync: false
      - key: DEKONT_APP_PASSWORD
        sync: false
      - key: MUSTI_MAIL
        sync: false
      - key: MUSTI_APP_PASSWORD
        sync: false
      - key: SCAN_INTERVAL_MS
        value: 1000
      - key: SCAN_LOOKBACK_DAYS
        value: 30
      - key: MANUAL_SCAN_LOOKBACK_DAYS
        value: 120
      - key: MAX_FETCH_PER_SCAN
        value: 1000
      - key: DATABASE_FILE
        value: /var/data/database.json
